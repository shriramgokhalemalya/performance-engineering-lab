spring.application.name=login-service
server.port=${SERVER_PORT:8081}
server.tomcat.mbeanregistry.enabled=true
logging.level.org.springframework.security=DEBUG
management.endpoints.web.exposure.include=*
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true
management.metrics.enable.tomcat=true

spring.datasource.url=${DB_URL:jdbc:oracle:thin:@//host.docker.internal:1521/FREEPDB1}
spring.datasource.driverClassName=oracle.jdbc.OracleDriver
spring.datasource.username=${DB_USERNAME:PERFLAB}
spring.datasource.password=${DB_PASSWORD:Oracle@123}
spring.jpa.hibernate.ddl-auto=none
spring.sql.init.mode=never

jwt.secret=${JWT_SECRET:performance-lab-jwt-secret-key-for-learning-only-2026}
jwt.expiration-seconds=${JWT_EXPIRATION_SECONDS:3600}
